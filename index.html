<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>趣味英语语法绘本 📖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ====== Reset & Base ====== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;min-height:100dvh;
  background:linear-gradient(160deg,#fff5f5 0%,#f0fff4 40%,#fef9ef 100%);
  color:#2d3436;overflow-x:hidden;
  touch-action:manipulation;user-select:none;
}

/* ====== Shared ====== */
.page{display:none;padding:0 16px 90px;max-width:520px;margin:0 auto}
.page.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}60%{transform:translateY(-6px)}}
@keyframes starSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes grammyBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.1)}}
@keyframes cardFlip{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}

/* ====== Top Bar ====== */
.top-bar{
  display:flex;align-items:center;gap:8px;padding:12px 0 8px;
  position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg,#fff5f5 0%,rgba(255,245,245,.95) 60%,transparent);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.top-bar .back-btn{
  width:38px;height:38px;border-radius:50%;border:none;background:#fff;
  font-size:1.1rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .15s;touch-action:manipulation;
}
.top-bar .back-btn:active{transform:scale(.88)}
.top-bar .title{font-size:1rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-bar .sub{font-size:.75rem;color:#999;font-weight:500;flex-shrink:0}

/* ====== Page: Home (Bookshelf) ====== */
.home-header{
  text-align:center;padding:28px 0 12px;
  background:linear-gradient(135deg,#FF6B6B,#ee5a24);
  margin:0 -16px 18px;border-radius:0 0 36px 36px;
  box-shadow:0 6px 30px rgba(255,107,107,.3);position:relative;overflow:hidden;
}
.home-header::before{content:'✨⭐🌈🎉';position:absolute;top:8px;right:14px;font-size:1.3rem;opacity:.5}
.home-header .mascot{font-size:3.2rem;display:block;margin-bottom:2px;animation:float 3s ease-in-out infinite}
.home-header h1{font-size:1.6rem;color:#fff;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.12)}
.home-header p{font-size:.85rem;color:rgba(255,255,255,.85);margin-top:3px;font-weight:500}

.stats-row{
  display:flex;justify-content:center;gap:28px;margin:-8px auto 16px;
  background:#fff;border-radius:18px;padding:10px 24px;max-width:300px;
  box-shadow:0 3px 15px rgba(0,0,0,.06);
}
.stats-row .stat{text-align:center}
.stats-row .stat-num{font-size:1.2rem;font-weight:900;color:#FF6B6B}
.stats-row .stat-label{font-size:.72rem;color:#999;font-weight:500}

/* Bookshelf */
.bookshelf{display:flex;flex-direction:column;gap:14px;padding:0 4px}
.book-card{
  display:flex;align-items:center;gap:16px;
  background:#fff;border-radius:22px;padding:16px 18px;
  box-shadow:0 3px 16px rgba(0,0,0,.05);cursor:pointer;
  transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;
  touch-action:manipulation;
}
.book-card:active{transform:scale(.97)}
.book-card.locked{opacity:.65;cursor:default}
.book-card.locked:active{transform:none}
.book-card .cover{
  width:56px;height:76px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.book-card .cover.c1{background:linear-gradient(135deg,#FF6B6B,#ee5a24)}
.book-card .cover.c2{background:linear-gradient(135deg,#4ECDC4,#2ecc71)}
.book-card .cover.c3{background:linear-gradient(135deg,#A29BFE,#6c5ce7)}
.book-card .cover.c4{background:linear-gradient(135deg,#FFE66D,#f9ca24)}
.book-card .info{flex:1;min-width:0}
.book-card .info .name{font-size:1.05rem;font-weight:700;color:#2d3436}
.book-card .info .name .en{font-size:.78rem;font-weight:400;color:#aaa;margin-left:6px}
.book-card .info .desc{font-size:.78rem;color:#999;margin-top:2px;line-height:1.3}
.book-card .info .progress{font-size:.7rem;font-weight:600;color:#4ECDC4;margin-top:4px}
.book-card .lock-icon{font-size:1.4rem;flex-shrink:0;opacity:.6}
.book-card .status-badge{
  font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:600;
  flex-shrink:0;margin-left:4px;
}
.book-card .status-badge.new{background:#FFE66D;color:#5a4a00}
.book-card .status-badge.doing{background:#e3fafc;color:#4ECDC4}
.book-card .status-badge.done{background:#f0fff4;color:#27ae60}
.book-card .status-badge.locked{background:#f1f2f6;color:#b2bec3}

/* Grammy Assistant */
.grammy-bubble{
  display:flex;align-items:flex-start;gap:10px;
  background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.04);border-left:3px solid #FFE66D;
}
.grammy-bubble .avatar{font-size:2.2rem;flex-shrink:0;animation:float 3s ease-in-out infinite}
.grammy-bubble .text{font-size:.9rem;line-height:1.5;color:#555}
.grammy-bubble .text strong{color:#FF6B6B}

/* ====== Page: Chapters ====== */
.chapter-list{display:flex;flex-direction:column;gap:10px;padding:4px}
.chapter-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:#fff;border-radius:16px;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.04);transition:transform .15s;
  touch-action:manipulation;
}
.chapter-item:active{transform:scale(.98)}
.chapter-item.done{background:#f0fff4}
.chapter-item.locked{opacity:.5;cursor:default}
.chapter-item.locked:active{transform:none}
.chapter-item .num{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;color:#fff;
}
.chapter-item .num.n1{background:linear-gradient(135deg,#FF6B6B,#ee5a24)}
.chapter-item .num.n2{background:linear-gradient(135deg,#4ECDC4,#2ecc71)}
.chapter-item .num.n3{background:linear-gradient(135deg,#A29BFE,#6c5ce7)}
.chapter-item .info{flex:1;min-width:0}
.chapter-item .info .name{font-size:.95rem;font-weight:600}
.chapter-item .info .name .en{font-size:.75rem;font-weight:400;color:#aaa;margin-left:4px}
.chapter-item .info .desc{font-size:.72rem;color:#999;margin-top:2px}
.chapter-item .star{font-size:1.2rem;flex-shrink:0}

/* ====== Page: Lesson ====== */
.lesson-page{
  background:#fff;border-radius:24px;padding:24px 20px;margin:8px 0 16px;
  box-shadow:0 4px 24px rgba(0,0,0,.05);position:relative;overflow:hidden;
  min-height:400px;animation:slideIn .35s ease;
}
.lesson-page .page-num{
  position:absolute;top:14px;right:18px;font-size:.75rem;color:#ddd;font-weight:600;
}
.lesson-page .grammy-box{
  display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;
  background:linear-gradient(135deg,#FFF9E6,#FFF5F5);border-radius:16px;
  padding:14px 16px;border:1px solid rgba(255,230,109,.3);
}
.lesson-page .grammy-box .g-icon{font-size:2.4rem;flex-shrink:0}
.lesson-page .grammy-box .g-text{font-size:.88rem;line-height:1.6;color:#555;font-weight:500}
.lesson-page h3{font-size:1.1rem;font-weight:700;color:#FF6B6B;margin-bottom:8px}
.lesson-page h3 .emoji{margin-right:6px}
.lesson-page p{font-size:.92rem;line-height:1.7;color:#444;margin-bottom:10px}
.lesson-page p .hl{color:#FF6B6B;font-weight:700;cursor:pointer;border-bottom:2px dashed #FFE66D;padding:0 2px;transition:background .2s}
.lesson-page p .hl:active{background:#FFF5F5;border-radius:4px}

/* Example Cards */
.example-card{
  background:linear-gradient(135deg,#f8f9ff,#f0fff4);border-radius:16px;
  padding:14px 16px;margin-bottom:12px;border:1px solid rgba(78,205,196,.15);
}
.example-card .ex-en{font-size:1rem;font-weight:600;color:#2d3436;line-height:1.6}
.example-card .ex-en .hl-w{color:#4ECDC4;font-weight:700;cursor:pointer;border-bottom:2px dashed #4ECDC4;padding:0 2px}
.example-card .ex-zh{font-size:.78rem;color:#888;margin-top:4px}
.example-card .ex-tag{
  display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:6px;
  font-weight:600;margin-top:6px;
}
.example-card .ex-tag.t1{background:#FFE66D;color:#5a4a00}
.example-card .ex-tag.t2{background:#e3fafc;color:#4ECDC4}
.example-card .ex-tag.t3{background:#fce4ec;color:#FF6B6B}

/* Rule Box */
.rule-box{
  background:linear-gradient(135deg,#FF6B6B,#ee5a24);border-radius:16px;
  padding:16px 18px;margin-bottom:14px;color:#fff;
}
.rule-box .r-title{font-size:.82rem;font-weight:700;opacity:.9;margin-bottom:6px}
.rule-box .r-body{font-size:1rem;line-height:1.6;font-weight:500}
.rule-box .r-body .r-hl{background:rgba(255,255,255,.25);padding:2px 8px;border-radius:6px}

/* Interactive Zone */
.interactive-zone{
  background:linear-gradient(135deg,#FFF9E6,#FFF5F5);border-radius:18px;
  padding:18px;margin-top:14px;border:2px dashed #FFE66D;
  text-align:center;
}
.interactive-zone .iz-title{font-size:.85rem;font-weight:700;color:#5a4a00;margin-bottom:12px}
.interactive-zone .iz-title .emoji{margin-right:4px}
.interactive-zone .sentence{font-size:1.1rem;font-weight:600;color:#2d3436;margin-bottom:14px;line-height:1.8}
.interactive-zone .sentence .blank{
  display:inline-block;min-width:60px;border-bottom:3px dashed #FF6B6B;
  color:#FF6B6B;padding:0 6px;cursor:pointer;min-height:28px;
  transition:all .2s;position:relative;
}
.interactive-zone .sentence .blank.filled{border-color:#4ECDC4;color:#4ECDC4;font-weight:900}
.interactive-zone .sentence .blank.wrong{border-color:#FF6B6B;animation:shake .4s ease;color:#FF6B6B}
.interactive-zone .options-row{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;
}
.interactive-zone .opt-chip{
  padding:8px 18px;border-radius:12px;border:2px solid #ddd;background:#fff;
  font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;
  touch-action:manipulation;
}
.interactive-zone .opt-chip:active{transform:scale(.92)}
.interactive-zone .opt-chip.selected{border-color:#4ECDC4;background:#f0fff4;color:#4ECDC4}
.interactive-zone .opt-chip.used{opacity:.3;pointer-events:none}
.interactive-zone .iz-feedback{font-size:.85rem;font-weight:600;margin-top:10px;min-height:24px}
.interactive-zone .iz-feedback.ok{color:#27ae60}
.interactive-zone .iz-feedback.fail{color:#FF6B6B}
.interactive-zone .iz-btn{
  margin-top:12px;padding:10px 24px;border-radius:14px;border:none;
  font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;
  transition:transform .15s;touch-action:manipulation;
}
.interactive-zone .iz-btn:active{transform:scale(.94)}

/* Click to Reveal Cards */
.reveal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.reveal-card{
  background:#fff;border:2px solid #eee;border-radius:16px;padding:16px 12px;
  text-align:center;cursor:pointer;transition:all .3s;min-height:70px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.reveal-card:active{transform:scale(.96)}
.reveal-card .front{font-size:.95rem;font-weight:600;color:#999}
.reveal-card .back{display:none;font-size:1rem;font-weight:700;color:#FF6B6B}
.reveal-card .back .ex{font-size:.78rem;font-weight:400;color:#888;margin-top:4px}
.reveal-card.flipped{border-color:#FFE66D;background:#FFF9E6}
.reveal-card.flipped .front{display:none}
.reveal-card.flipped .back{display:block;animation:popIn .3s ease}

/* Slider */
.slider-container{margin:12px 0;text-align:center}
.slider-container input[type=range]{
  -webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:linear-gradient(90deg,#4ECDC4,#FFE66D);outline:none;
}
.slider-container input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:28px;height:28px;border-radius:50%;
  background:#FF6B6B;cursor:pointer;box-shadow:0 2px 8px rgba(255,107,107,.3);
}
.slider-container .slider-label{font-size:.82rem;color:#666;margin-top:6px;font-weight:600}

/* Page Navigation */
.page-nav{
  display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;
}
.page-nav .nav-btn{
  padding:10px 20px;border-radius:14px;border:none;font-size:.88rem;
  font-weight:700;font-family:inherit;cursor:pointer;
  transition:transform .15s;touch-action:manipulation;
  display:flex;align-items:center;gap:6px;
}
.page-nav .nav-btn:active{transform:scale(.93)}
.page-nav .nav-btn.prev{background:#f1f2f6;color:#636e72}
.page-nav .nav-btn.next{background:linear-gradient(135deg,#FF6B6B,#ee5a24);color:#fff;box-shadow:0 3px 12px rgba(255,107,107,.25)}
.page-nav .nav-btn.next:disabled{opacity:.5;cursor:default}
.page-nav .nav-btn.finish{background:linear-gradient(135deg,#4ECDC4,#2ecc71);color:#fff;box-shadow:0 3px 12px rgba(78,205,196,.25)}
.page-nav .dots{display:flex;gap:5px}
.page-nav .dots .dot{width:7px;height:7px;border-radius:50%;background:#ddd;transition:all .3s}
.page-nav .dots .dot.active{background:#FF6B6B;width:18px;border-radius:4px}

/* ====== Lesson Complete Overlay ====== */
.complete-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;
  background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;
  animation:fadeIn .3s ease;
}
.complete-modal{
  background:#fff;border-radius:32px;padding:36px 28px;text-align:center;
  max-width:340px;width:90%;animation:popIn .5s ease;
}
.complete-modal .big-icon{font-size:3.6rem;display:block;margin-bottom:6px;animation:grammyBounce .6s ease}
.complete-modal .star-display{font-size:2.8rem;margin:8px 0}
.complete-modal .star-display .s{display:inline-block;animation:starSpin .5s ease forwards;opacity:0}
.complete-modal .star-display .s:nth-child(1){animation-delay:.1s}
.complete-modal .star-display .s:nth-child(2){animation-delay:.3s}
.complete-modal .star-display .s:nth-child(3){animation-delay:.5s}
.complete-modal .title{font-size:1.3rem;font-weight:900;color:#FF6B6B;margin-bottom:4px}
.complete-modal .sub{font-size:.9rem;color:#888;margin-bottom:18px;line-height:1.4}
.complete-modal .btn-group{display:flex;flex-direction:column;gap:10px}
.complete-modal .btn-group button{
  padding:12px;border-radius:16px;border:none;font-size:.95rem;
  font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s;
  touch-action:manipulation;
}
.complete-modal .btn-group button:active{transform:scale(.96)}
.complete-modal .btn-group .btn-primary{background:linear-gradient(135deg,#4ECDC4,#2ecc71);color:#fff}
.complete-modal .btn-group .btn-secondary{background:#f1f2f6;color:#636e72}

/* ====== Confetti ====== */
.confetti-box{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:101;overflow:hidden}
.confetti-piece{
  position:absolute;width:8px;height:8px;top:-10px;border-radius:2px;
  animation:confettiFall linear forwards;
}

/* ====== Page: Progress ====== */
.progress-card{background:#fff;border-radius:24px;padding:24px;margin-top:16px;box-shadow:0 3px 16px rgba(0,0,0,.04)}
.progress-card .p-title{font-size:1rem;font-weight:700;margin-bottom:16px}
.progress-card .p-bar{height:10px;background:#f1f2f6;border-radius:5px;overflow:hidden;margin-bottom:12px}
.progress-card .p-bar .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#FF6B6B,#FFE66D,#4ECDC4);transition:width .6s ease}
.progress-card .p-stat{display:flex;justify-content:space-between;font-size:.8rem;color:#888;margin-bottom:16px}
.progress-card .book-progress{margin-bottom:12px}
.progress-card .book-progress .bp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.progress-card .book-progress .bp-row .bp-name{font-size:.82rem;font-weight:600;flex:1}
.progress-card .book-progress .bp-row .bp-bar{flex:2;height:6px;background:#f1f2f6;border-radius:3px;overflow:hidden}
.progress-card .book-progress .bp-row .bp-bar .fill{height:100%;border-radius:3px;transition:width .6s ease}
.progress-card .book-progress .bp-row .bp-num{font-size:.75rem;color:#999;min-width:35px;text-align:right}

/* ====== Popup ====== */
.popup-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;
  background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s ease;
}
.popup-card{
  background:#fff;border-radius:24px;padding:24px 20px;max-width:300px;width:85%;
  text-align:center;animation:popIn .3s ease;box-shadow:0 8px 40px rgba(0,0,0,.12);
}
.popup-card .p-icon{font-size:2.8rem;display:block;margin-bottom:6px}
.popup-card .p-title{font-size:1rem;font-weight:700;color:#2d3436;margin-bottom:4px}
.popup-card .p-body{font-size:.85rem;color:#666;line-height:1.5;margin-bottom:14px}
.popup-card .p-btn{
  padding:8px 28px;border-radius:12px;border:none;font-size:.88rem;
  font-weight:700;font-family:inherit;background:linear-gradient(135deg,#FF6B6B,#ee5a24);
  color:#fff;cursor:pointer;transition:transform .15s;
  touch-action:manipulation;
}
.popup-card .p-btn:active{transform:scale(.94)}

/* ====== Welcome Animation ====== */
.welcome-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
  background:linear-gradient(135deg,#FF6B6B,#ee5a24);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s ease,transform .6s ease;
}
.welcome-overlay.hide{opacity:0;transform:scale(1.1);pointer-events:none}
.welcome-overlay .w-mascot{font-size:5rem;animation:grammyBounce 1s ease infinite}
.welcome-overlay h1{font-size:2rem;color:#fff;font-weight:900;margin-top:12px;text-shadow:0 3px 12px rgba(0,0,0,.15)}
.welcome-overlay p{font-size:1rem;color:rgba(255,255,255,.85);margin-top:6px}
.welcome-overlay .w-btn{
  margin-top:28px;padding:14px 44px;border-radius:24px;border:none;
  font-size:1.1rem;font-weight:700;font-family:inherit;background:#fff;
  color:#FF6B6B;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.15);
  transition:transform .15s;touch-action:manipulation;
}
.welcome-overlay .w-btn:active{transform:scale(.94)}
.welcome-overlay .w-stars{
  position:absolute;font-size:1.5rem;animation:float 4s ease-in-out infinite;
}
.welcome-overlay .w-stars:nth-child(1){top:15%;left:10%;animation-delay:0s}
.welcome-overlay .w-stars:nth-child(2){top:25%;right:12%;animation-delay:.5s}
.welcome-overlay .w-stars:nth-child(3){bottom:30%;left:8%;animation-delay:1s}
.welcome-overlay .w-stars:nth-child(4){bottom:20%;right:15%;animation-delay:1.5s}

/* ====== Viewport ====== */
@media(min-width:500px){
  .page{padding:0 24px 90px;max-width:600px}
  .home-header{margin:0 -24px 18px}
  .reveal-grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<!-- ====== Welcome ====== -->
<div class="welcome-overlay" id="welcomeOverlay">

// ======================================================================
// STATE
// ======================================================================
const STORAGE_KEY = 'grammar_picture_book_v1';
let state = loadState();
let currentBookId = null;
let currentLessonId = null;
let currentPageIdx = 0;
let interactiveAnswered = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { completedLessons: [], stars: {}, lastVisit: null };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ======================================================================
// NAVIGATION
// ======================================================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + id);
  if (el) el.classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  showPage('home');
  renderHome();
}

function dismissWelcome() {
  const el = document.getElementById('welcomeOverlay');
  el.classList.add('hide');
  setTimeout(() => { el.style.display = 'none'; }, 600);
}

// ======================================================================
// RENDER: HOME
// ======================================================================
function renderHome() {
  let totalStars = 0;
  let totalDone = state.completedLessons.length;
  let totalAll = 0;
  BOOKS.forEach(b => { totalAll += b.lessons.length; });
  Object.values(state.stars).forEach(s => totalStars += s);
  const pct = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;

  document.getElementById('totalStars').textContent = totalStars;
  document.getElementById('totalLessons').textContent = totalDone;
  document.getElementById('totalProgress').textContent = pct + '%';

  const shelf = document.getElementById('bookshelf');
  shelf.innerHTML = BOOKS.map(b => {
    const done = b.lessons.filter(l => state.completedLessons.includes(l.id)).length;
    const total = b.lessons.length;
    const unlocked = b.lessons.length > 0;
    const locked = b.lessons.length === 0;
    const allDone = unlocked && done === total;

    let badge = '';
    if (locked) badge = '<span class="status-badge locked">🔒 未解锁</span>';
    else if (allDone) badge = '<span class="status-badge done">✅ 已完成</span>';
    else if (done > 0) badge = '<span class="status-badge doing">📖 学习中</span>';
    else badge = '<span class="status-badge new">👉 开始</span>';

    const progStr = locked ? '' : `${done}/${total} 课`;

    return `<div class="book-card ${locked ? 'locked' : ''}" onclick="${locked ? '' : "openBook("+b.id+")"}">
      <div class="cover ${b.color}">${b.icon}</div>
      <div class="info">
        <div class="name">第${b.id}册 ${b.name}<span class="en">${b.nameEn}</span></div>
        <div class="desc">${b.desc}</div>
        ${progStr ? '<div class="progress">' + progStr + '</div>' : ''}
      </div>
      ${locked ? '<span class="lock-icon">🔒</span>' : badge}
    </div>`;
  }).join('');
}

// ======================================================================
// CHAPTERS
// ======================================================================
function openBook(bookId) {
  currentBookId = bookId;
  const book = BOOKS.find(b => b.id === bookId);
  if (!book || book.lessons.length === 0) return;

  const done = book.lessons.filter(l => state.completedLessons.includes(l.id)).length;
  document.getElementById('chaptersTitle').textContent = `第${book.id}册 ${book.name}`;
  document.getElementById('chaptersSub').textContent = `${done}/${book.lessons.length}`;

  const list = document.getElementById('chapterList');
  list.innerHTML = book.lessons.map(l => {
    const completed = state.completedLessons.includes(l.id);
    const stars = state.stars[l.id] || 0;
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
    return `<div class="chapter-item ${completed ? 'done' : ''}" onclick="startLesson('${l.id}')">
      <div class="num n${bookId}">${l.num}</div>
      <div class="info">
        <div class="name">第${l.num}课 ${l.name}<span class="en">${l.nameEn}</span></div>
        <div class="desc">${l.desc}</div>
      </div>
      <div class="star">${starStr}</div>
    </div>`;
  }).join('');

  showPage('chapters');
}

// ======================================================================
// LESSON
// ======================================================================
function startLesson(lessonId) {
  currentLessonId = lessonId;
  currentPageIdx = 0;
  interactiveAnswered = false;

  const lesson = findLesson(lessonId);
  if (!lesson) return;

  document.getElementById('lessonTitle').textContent = `${lesson.icon} 第${lesson.num}课 ${lesson.name}`;
  renderLessonPage();
  showPage('lesson');
}

function findLesson(lessonId) {
  for (const b of BOOKS) {
    for (const l of b.lessons) {
      if (l.id === lessonId) return l;
    }
  }
  return null;
}

function findBookByLesson(lessonId) {
  for (const b of BOOKS) {
    if (b.lessons.some(l => l.id === lessonId)) return b;
  }
  return null;
}

function renderLessonPage() {
  const lesson = findLesson(currentLessonId);
  if (!lesson) return;
  const pages = lesson.pages;
  const page = pages[currentPageIdx];
  if (!page) return;

  document.getElementById('lessonPageCounter').textContent = `${currentPageIdx+1}/${pages.length}`;

  // Dots
  const dots = document.getElementById('pageDots');
  dots.innerHTML = pages.map((_, i) =>
    `<span class="dot ${i === currentPageIdx ? 'active' : ''}"></span>`
  ).join('');

  // Prev/Next buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.style.visibility = currentPageIdx === 0 ? 'hidden' : 'visible';

  if (currentPageIdx === pages.length - 1) {
    nextBtn.textContent = '🎉 完成！';
    nextBtn.className = 'nav-btn finish';
    nextBtn.onclick = completeLesson;
  } else {
    nextBtn.textContent = '下页 →';
    nextBtn.className = 'nav-btn next';
    nextBtn.onclick = nextPage;
  }

  // Render content
  const container = document.getElementById('lessonContent');
  const pageNum = currentPageIdx + 1;

  let html = `<div class="lesson-page">`;
  html += `<span class="page-num">📄 ${pageNum}/${pages.length}</span>`;

  // Grammy
  if (page.grammy) {
    html += `<div class="grammy-box"><span class="g-icon">🐱</span><div class="g-text">${page.grammy}</div></div>`;
  }

  switch (page.type) {
    case 'intro':
      html += `<h3>${page.title}</h3>`;
      html += page.content || '';
      break;

    case 'cards':
      html += `<h3>👆 ${page.title}</h3>`;
      html += `<div class="reveal-grid">`;
      page.items.forEach((item, i) => {
        html += `<div class="reveal-card" onclick="flipCard(this)">
          <div class="front">${item.front}</div>
          <div class="back">${item.back}</div>
        </div>`;
      });
      html += `</div>`;
      break;

    case 'examples':
      html += `<h3>📝 ${page.title}</h3>`;
      if (page.examples) {
        page.examples.forEach(ex => {
          html += `<div class="example-card">
            <div class="ex-en">${ex.en}</div>
            ${ex.zh ? '<div class="ex-zh">' + ex.zh + '</div>' : ''}
            ${ex.tags ? ex.tags.map(t => '<span class="ex-tag ' + t.cls + '">' + t.text + '</span>').join(' ') : ''}
          </div>`;
        });
      }
      break;

    case 'interactive':
      html += `<h3>🎮 ${page.title}</h3>`;
      html += renderInteractive(page);
      break;
  }

  html += `</div>`;
  container.innerHTML = html;
}

function nextPage() {
  const lesson = findLesson(currentLessonId);
  if (!lesson || currentPageIdx >= lesson.pages.length - 1) return;
  currentPageIdx++;
  interactiveAnswered = false;
  renderLessonPage();
}

function prevPage() {
  if (currentPageIdx <= 0) return;
  currentPageIdx--;
  interactiveAnswered = false;
  renderLessonPage();
}

function exitLesson() {
  goHome();
}

function flipCard(el) {
  el.classList.toggle('flipped');
}

// ======================================================================
// INTERACTIVE RENDER
// ======================================================================
function renderInteractive(page) {
  let html = `<div class="interactive-zone">`;
  html += `<div class="iz-title">🎮 ${page.title}</div>`;

  if (page.isPluralGame) {
    // Plural game: show pairs
    html += `<div style="font-size:.9rem;color:#666;margin-bottom:12px">点击选择正确的复数形式：</div>`;
    html += `<div class="options-row">`;
    page.options.forEach(opt => {
      html += `<span class="opt-chip" onclick="checkPlural('${opt}','${page.correctPlural}',this)">${opt}</span>`;
    });
    html += `</div>`;
    html += `<div class="iz-feedback" id="pluralFb"></div>`;

  } else if (page.isJudge) {
    // Judge (sentence vs phrase)
    html += `<div style="font-size:1.1rem;font-weight:600;margin-bottom:14px">${page.sentence}</div>`;
    html += `<div class="options-row">`;
    html += `<span class="opt-chip" onclick="judgeAnswer('sentence','${page.correctAnswer}',this)">✅ 句子</span>`;
    html += `<span class="opt-chip" onclick="judgeAnswer('phrase','${page.correctAnswer}',this)">❌ 短语</span>`;
    html += `</div>`;
    html += `<div class="iz-feedback" id="judgeFb"></div>`;

  } else if (page.highlightWords) {
    // Click words in sentence
    html += `<div style="font-size:1.05rem;font-weight:600;margin-bottom:14px;line-height:2">`;
    const words = page.sentence.split(' ');
    words.forEach(w => {
      const clean = w.replace(/[.,!?;:]/g, '');
      const punct = w.replace(clean, '');
      const isHl = page.highlightWords.some(h => h.word === clean);
      if (isHl) {
        html += `<span class="hl" onclick="highlightWord('${clean}',this)">${clean}</span>${punct} `;
      } else {
        html += `${w} `;
      }
    });
    html += `</div>`;
    html += `<div class="iz-feedback" id="hlFb"></div>`;

  } else if (page.sentence !== undefined) {
    // Fill blank with options
    const parts = page.sentence.split('___');
    html += `<div class="sentence">`;
    html += parts[0];
    html += `<span class="blank" id="fillBlank"></span>`;
    html += parts.length > 1 ? parts[1] : '';
    html += `</div>`;
    html += `<div class="options-row" id="optRow">`;
    page.options.forEach(opt => {
      html += `<span class="opt-chip" onclick="fillBlank('${opt}','${page.correct}',this)">${opt}</span>`;
    });
    html += `</div>`;
    html += `<div class="iz-feedback" id="fillFb"></div>`;
  }

  html += `</div>`;
  return html;
}

// ======================================================================
// INTERACTIVE HANDLERS
// ======================================================================
function fillBlank(selected, correct, el) {
  if (interactiveAnswered) return;
  const fb = document.getElementById('fillFb');
  const blank = document.getElementById('fillBlank');

  if (selected === correct) {
    interactiveAnswered = true;
    blank.textContent = selected;
    blank.className = 'blank filled';
    fb.className = 'iz-feedback ok';
    fb.innerHTML = '✅ 答对了！太棒了！🎉';
    document.querySelectorAll('#optRow .opt-chip').forEach(c => c.style.pointerEvents = 'none');
  } else {
    fb.className = 'iz-feedback fail';
    fb.innerHTML = '💪 再想想哦～';
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 500);
  }
}

function checkPlural(selected, correct, el) {
  if (interactiveAnswered) return;
  const fb = document.getElementById('pluralFb');
  if (selected === correct) {
    interactiveAnswered = true;
    fb.className = 'iz-feedback ok';
    fb.innerHTML = '✅ 正确！👍 太棒了！';
    el.classList.add('selected');
    document.querySelectorAll('.opt-chip').forEach(c => c.style.pointerEvents = 'none');
  } else {
    fb.className = 'iz-feedback fail';
    fb.innerHTML = '❌ 再想想哦～这个变化规则不太一样';
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 500);
  }
}

function judgeAnswer(selected, correct, el) {
  if (interactiveAnswered) return;
  const fb = document.getElementById('judgeFb');
  const lesson = findLesson(currentLessonId);
  const page = lesson.pages[currentPageIdx];

  if (selected === correct) {
    interactiveAnswered = true;
    fb.className = 'iz-feedback ok';
    fb.innerHTML = '✅ 没错！' + (page.explanation || '');
    el.classList.add('selected');
    document.querySelectorAll('.opt-chip').forEach(c => c.style.pointerEvents = 'none');
  } else {
    fb.className = 'iz-feedback fail';
    fb.innerHTML = '💪 ' + (page.explanation || '再想想！');
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 500);
  }
}

let hlFound = 0;
function highlightWord(word, el) {
  if (interactiveAnswered) return;
  const lesson = findLesson(currentLessonId);
  const page = lesson.pages[currentPageIdx];
  const fb = document.getElementById('hlFb');

  el.style.background = '#FFE66D';
  el.style.borderRadius = '4px';
  el.style.padding = '0 4px';

  const match = page.highlightWords.find(h => h.word === word);
  if (match) {
    hlFound++;
    const total = page.highlightWords.length;
    if (hlFound >= total) {
      interactiveAnswered = true;
      fb.className = 'iz-feedback ok';
      fb.innerHTML = page.message || '🎉 全部找到了！太棒了！';
    } else {
      fb.className = 'iz-feedback ok';
      fb.innerHTML = `👍 找到了"${word}"！还差 ${total - hlFound} 个`;
    }
  }
}

// ======================================================================
// COMPLETE LESSON
// ======================================================================
function completeLesson() {
  const lesson = findLesson(currentLessonId);
  if (!lesson) return;

  // Mark as completed
  if (!state.completedLessons.includes(lesson.id)) {
    state.completedLessons.push(lesson.id);
  }

  // Give stars (1 star for completing)
  const currentStars = state.stars[lesson.id] || 0;
  if (currentStars < 1) {
    state.stars[lesson.id] = 1;
  }
  saveState();

  // Show celebration
  showCelebration(lesson);
}

function showCelebration(lesson) {
  const overlay = document.createElement('div');
  overlay.className = 'complete-overlay';
  overlay.id = 'completeOverlay';
  overlay.innerHTML = `
    <div class="complete-modal">
      <span class="big-icon">🐱</span>
      <div class="star-display">
        <span class="s">⭐</span><span class="s">⭐</span><span class="s">⭐</span>
      </div>
      <div class="title">🎉 太棒了！</div>
      <div class="sub">你完成了「第${lesson.num}课 ${lesson.name}」<br>Grammy 为你鼓掌！👏</div>
      <div class="btn-group">
        <button class="btn-primary" onclick="closeCelebrationAndGoChapters()">📚 继续下一课</button>
        <button class="btn-secondary" onclick="closeCelebration()">🏠 回首页</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Confetti
  spawnConfetti();

  // Update home stats
  renderHome();
}

function closeCelebration() {
  const el = document.getElementById('completeOverlay');
  if (el) el.remove();
  goHome();
}

function closeCelebrationAndGoChapters() {
  const el = document.getElementById('completeOverlay');
  if (el) el.remove();
  const book = findBookByLesson(currentLessonId);
  if (book) openBook(book.id);
}

function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-box';
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#fd79a8','#fdcb6e','#00cec9','#e17055'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (Math.random() * 8 + 4) + 'px';
    p.style.height = (Math.random() * 8 + 4) + 'px';
    p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 2) + 's';
    p.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(p);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 4000);
}

// ======================================================================
// INIT
// ======================================================================
renderHome();

// Save visit
state.lastVisit = new Date().toISOString();
saveState();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'ArrowRight') {
    const lesson = findLesson(currentLessonId);
    if (lesson && currentPageIdx >= lesson.pages.length - 1) completeLesson();
    else nextPage();
  }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  if (!document.getElementById('page-lesson').classList.contains('active')) return;
  touchStartX = e.touches[0].clientX;
});
document.addEventListener('touchend', e => {
  if (!document.getElementById('page-lesson').classList.contains('active')) return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 60) {
    if (diff < 0) {
      const lesson = findLesson(currentLessonId);
      if (lesson && currentPageIdx >= lesson.pages.length - 1) completeLesson();
      else nextPage();
    } else {
      prevPage();
    }
  }
});
</script>
</body>
</html>
